<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image & Video Analyzer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1>🎬 Image & Video Analyzer</h1>
            <p>Analyze images and videos with AI-powered insights</p>
        </header>

        <!-- Navigation -->
        <nav class="tabs">
            <button class="tab-button active" data-tab="image">📸 Image Analysis</button>
            <button class="tab-button" data-tab="video">🎥 Video Analysis</button>
            <button class="tab-button" data-tab="batch">📁 Batch Processing</button>
        </nav>

        <!-- Image Analysis Tab -->
        <div id="image" class="tab-content active">
            <div class="upload-area">
                <div class="upload-box" id="imageUploadBox">
                    <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="17 8 12 3 7 8"></polyline>
                        <line x1="12" y1="3" x2="12" y2="15"></line>
                    </svg>
                    <h3>Upload an Image</h3>
                    <p>Drag and drop or click to select</p>
                    <input type="file" id="imageInput" accept="image/*" hidden>
                </div>
                <div class="format-select">
                    <label>Output Format:</label>
                    <select id="imageFormat">
                        <option value="json">JSON</option>
                        <option value="txt">Text</option>
                        <option value="csv">CSV</option>
                    </select>
                </div>
                <button class="analyze-button" id="analyzeImageBtn">Analyze Image</button>
            </div>
            <div id="imageResults" class="results-area" style="display: none;"></div>
        </div>

        <!-- Video Analysis Tab -->
        <div id="video" class="tab-content">
            <div class="upload-area">
                <div class="upload-box" id="videoUploadBox">
                    <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <path d="M23 7l-7 5 7 5V7z"></path>
                        <rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect>
                    </svg>
                    <h3>Upload a Video</h3>
                    <p>Drag and drop or click to select</p>
                    <input type="file" id="videoInput" accept="video/*" hidden>
                </div>
                <div class="video-options">
                    <div class="option-group">
                        <label>Max Frames:</label>
                        <input type="number" id="maxFrames" value="10" min="1" max="100">
                    </div>
                    <div class="option-group">
                        <label>Sample FPS:</label>
                        <input type="number" id="videoFps" value="2" min="1" max="30">
                    </div>
                    <div class="option-group">
                        <label>Output Format:</label>
                        <select id="videoFormat">
                            <option value="json">JSON</option>
                            <option value="txt">Text</option>
                            <option value="csv">CSV</option>
                        </select>
                    </div>
                </div>
                <button class="analyze-button" id="analyzeVideoBtn">Analyze Video</button>
            </div>
            <div id="videoResults" class="results-area" style="display: none;"></div>
        </div>

        <!-- Batch Processing Tab -->
        <div id="batch" class="tab-content">
            <div class="upload-area">
                <div class="upload-box" id="batchUploadBox">
                    <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="17 8 12 3 7 8"></polyline>
                        <line x1="12" y1="3" x2="12" y2="15"></line>
                    </svg>
                    <h3>Upload Multiple Files</h3>
                    <p>Drag and drop or click to select</p>
                    <input type="file" id="batchInput" accept="image/*,video/*" multiple hidden>
                </div>
                <div class="batch-options">
                    <div class="option-group">
                        <label>File Type:</label>
                        <select id="batchType">
                            <option value="image">Images</option>
                            <option value="video">Videos</option>
                        </select>
                    </div>
                    <div class="option-group">
                        <label>Output Format:</label>
                        <select id="batchFormat">
                            <option value="json">JSON</option>
                            <option value="txt">Text</option>
                            <option value="csv">CSV</option>
                        </select>
                    </div>
                </div>
                <button class="analyze-button" id="analyzeBatchBtn">Analyze Files</button>
            </div>
            <div id="batchResults" class="results-area" style="display: none;"></div>
        </div>

        <!-- Footer -->
        <footer class="footer">
            <p>Made with ❤️ using Hugging Face Models</p>
        </footer>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
